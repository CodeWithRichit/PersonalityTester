<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take the Test – PersonalityTester</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="quiz.css">
</head>
<body>
    <!-- NAVBAR -->
    <div class="navbar">
        <a href="index.html" style="text-decoration:none;color:inherit;">
            <div class="logo">PersonalityTester</div>
        </a>
        <div class="nav-links">
            <a href="personality.html">Personality Theories</a>
            <a href="about.html">About us</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>
    <!--SCREEN 1: QUIZ-->
    <div id="quiz-screen" class="screen">

        <div class="quiz-header">
            <p id="test-label" class="test-label"></p>
            <h1 id="quiz-title" class="quiz-title"></h1>
            <div class="progress-bar-wrap">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <p id="progress-text" class="progress-text"></p>
        </div>
        <div class="question-card">
            <p id="question-number" class="question-number"></p>
            <p id="question-text" class="question-text"></p>

            <div class="likert-scale">
                <span class="likert-label">Strongly Disagree</span>
                <div class="likert-options" id="likert-options">
                    <label class="likert-option">
                        <input type="radio" name="answer" value="1">
                        <span class="likert-bubble">1</span>
                    </label>
                    <label class="likert-option">
                        <input type="radio" name="answer" value="2">
                        <span class="likert-bubble">2</span>
                    </label>
                    <label class="likert-option">
                        <input type="radio" name="answer" value="3">
                        <span class="likert-bubble">3</span>
                    </label>
                    <label class="likert-option">
                        <input type="radio" name="answer" value="4">
                        <span class="likert-bubble">4</span>
                    </label>
                    <label class="likert-option">
                        <input type="radio" name="answer" value="5">
                        <span class="likert-bubble">5</span>
                    </label>
                </div>
                <span class="likert-label">Strongly Agree</span>
            </div>
            <div class="quiz-nav">
                <button id="prev-btn" class="nav-btn secondary" onclick="prevQuestion()">← Back</button>
                <button id="next-btn" class="nav-btn primary" onclick="nextQuestion()">Next →</button>
            </div>
        </div>
    </div>
    <!--SCREEN 2: RESULTS (16P)-->
    <div id="result-16p-screen" class="screen hidden">

        <div class="result-hero">
            <p class="result-test-label">16 Personalities Result</p>
            <div id="result-emoji" class="result-emoji"></div>
            <h1 id="result-type" class="result-type"></h1>
            <h2 id="result-title" class="result-title"></h2>
        </div>
        <div class="result-body">

            <div class="result-card">
                <h3 class="result-section-title">Who You Are</h3>
                <p id="result-description" class="result-description"></p>
            </div>
            <div class="result-card">
                <h3 class="result-section-title">Famous People Like You</h3>
                <div id="result-famous" class="famous-list"></div>
            </div>

            <div class="result-card tip-card">
                <h3 class="result-section-title">💡 Your Growth Tip</h3>
                <p id="result-tip" class="result-tip"></p>
            </div>
        </div>
        <div class="result-actions">
    <button class="action-btn" onclick="retakeTest()">Retake Test</button>
    <button class="action-btn" onclick="window.location.href='villain.html'">🦹 Meet Your Dark Side</button>
    <a href="index.html"><button class="action-btn secondary">Back to Home</button></a>
</div>
    </div>
    <!--SCREEN 3: RESULTS (BIG 5)-->
    <div id="result-big5-screen" class="screen hidden">

        <div class="result-hero">
            <p class="result-test-label">Big 5 Personality Result</p>
            <h1 class="result-type" style="font-size:2rem;">Your Trait Profile</h1>
        </div>
        <div class="result-body">
            <div id="big5-traits" class="big5-traits"></div>
            <!-- SHAREABLE CARD -->
            <!-- <div class="share-section">
                <h3 class="result-section-title">Share Your Result</h3>
                <div id="share-card-big5" class="share-card">
                    <div class="share-card-inner">
                        <p class="share-site">PersonalityTester.com</p>
                        <p class="share-type" style="margin-bottom:1rem;">My Big 5 Profile</p>
                        <div id="share-big5-traits" class="share-big5-traits"></div>
                    </div>
                </div>
                <button class="share-btn" onclick="copyResultBig5()">📋 Copy Result</button>
            </div> -->
        </div>
        <div class="result-actions">
            <button class="action-btn" onclick="retakeTest()">Retake Test</button>
            <a href="index.html"><button class="action-btn secondary">Back to Home</button></a>
        </div>
    </div>
    <script src="question.js"></script>
<script src="scoring.js"></script>
<script src="result.js"></script>
<script src="quiz.js"></script>
</body>
</html>
